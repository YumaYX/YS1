name: Run RuboCop
on:
  push:
    branches: ["workshop"]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4"
          bundler-cache: true
      - name: Run Rubocop
        run: |
          bundle exec rake rubocop

name: Test
on:
  workflow_run:
    workflows: ["Run RuboCop"]
    types:
      - completed
jobs:
  test:
    runs-on: ${{ matrix. os }}
    strategy:
      max-parallel: 4
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        ruby: [3.0, 3.1, 3.2, 3.3, 3.4, 4.0]
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    steps:
    - uses: actions/checkout@v5
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - run: bundle exec rake test
